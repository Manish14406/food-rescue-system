[build]
  # Set the base directory to where the React app lives
  base = "frontend"
  # The command to build the React app
  command = "npm install && npm run build"
  # The directory that contains the compiled assets
  publish = "dist"

[build.environment]
  NODE_VERSION = "20"

# Set up redirects for React Router (Single Page Application)
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
  force = false

# Set up redirects for API proxying
[[redirects]]
  from = "/api/*"
  to = "https://food-rescue-system.onrender.com/api/:splat"
  status = 200
  force = true
